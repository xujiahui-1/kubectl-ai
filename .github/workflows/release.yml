name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.bin_name }})
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: linux
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          bin_name="kubectl-ai-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "bin_name=$bin_name" >> $GITHUB_ENV
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "$bin_name" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.bin_name }}
          path: ${{ env.bin_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kubectl-ai-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum kubectl-ai-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kubectl-ai-*
            checksums.txt
          generate_release_notes: true
